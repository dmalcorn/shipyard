<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipyard — Command Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset & Root ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-hull: #0a0c10;
  --bg-plate: #12151c;
  --bg-panel: #181c26;
  --bg-input: #0e1118;
  --border-weld: #2a2f3e;
  --border-glow: #3d4560;
  --amber: #e8a830;
  --amber-dim: #b8842a;
  --amber-glow: rgba(232, 168, 48, 0.15);
  --green-ok: #34d399;
  --green-glow: rgba(52, 211, 153, 0.12);
  --red-alert: #f87171;
  --red-glow: rgba(248, 113, 113, 0.12);
  --blue-data: #60a5fa;
  --blue-glow: rgba(96, 165, 250, 0.1);
  --text-primary: #e2e5ec;
  --text-secondary: #8891a5;
  --text-dim: #555d72;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 6px;
  --transition: 180ms ease;
}

html { font-size: 15px; }

body {
  font-family: var(--font-mono);
  background: var(--bg-hull);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232, 168, 48, 0.04), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(42, 47, 62, 0.15) 60px, rgba(42, 47, 62, 0.15) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(42, 47, 62, 0.08) 60px, rgba(42, 47, 62, 0.08) 61px);
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem;
  border-bottom: 1px solid var(--border-weld);
  background: linear-gradient(180deg, rgba(18, 21, 28, 0.95), rgba(10, 12, 16, 0.98));
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.6rem;
  letter-spacing: -0.02em;
  color: var(--amber);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.logo-icon {
  width: 28px;
  height: 28px;
  border: 2px solid var(--amber);
  border-radius: 3px;
  display: grid;
  place-items: center;
  font-size: 0.85rem;
  transform: rotate(-5deg);
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.health-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.35rem 0.8rem;
  border-radius: 20px;
  border: 1px solid var(--border-weld);
  background: var(--bg-plate);
  transition: all var(--transition);
}

.health-badge.ok { border-color: var(--green-ok); background: var(--green-glow); color: var(--green-ok); }
.health-badge.error { border-color: var(--red-alert); background: var(--red-glow); color: var(--red-alert); }
.health-badge.checking { color: var(--text-dim); }

.health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: all var(--transition);
}

.health-badge.ok .health-dot { background: var(--green-ok); box-shadow: 0 0 8px var(--green-ok); }
.health-badge.error .health-dot { background: var(--red-alert); box-shadow: 0 0 8px var(--red-alert); }
.health-badge.checking .health-dot { background: var(--text-dim); animation: pulse-dim 1.2s ease infinite; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.35rem 0.8rem;
  border-radius: 20px;
  border: 1px solid var(--amber);
  background: var(--amber-glow);
  color: var(--amber);
  animation: live-pulse 2s ease infinite;
  display: none;
}

.live-badge.active { display: flex; }

.live-badge .live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 8px var(--amber);
}

@keyframes live-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes pulse-dim {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── Layout ── */
.bridge {
  display: flex;
  flex-direction: column;
  gap: 1px;
  max-width: 1400px;
  margin: 1.5rem auto;
  padding: 0 1.5rem;
}

/* ── Panels ── */
.panel {
  background: var(--bg-plate);
  border: 1px solid var(--border-weld);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color var(--transition);
}

.panel:hover { border-color: var(--border-glow); }

.panel-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.8rem 1.1rem;
  border-bottom: 1px solid var(--border-weld);
  background: var(--bg-panel);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
}

.panel-header .tag {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  padding: 0.15rem 0.45rem;
  border-radius: 3px;
  letter-spacing: 0.05em;
}

.tag-live { background: var(--amber-glow); color: var(--amber); }
.tag-replay { background: var(--blue-glow); color: var(--blue-data); }

.panel-header .spacer { flex: 1; }

.panel-body { padding: 1.1rem; flex: 1; }

/* ── Session Picker ── */
.session-picker {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.session-select {
  background: var(--bg-input);
  border: 1px solid var(--border-weld);
  border-radius: var(--radius);
  padding: 0.3rem 0.6rem;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  outline: none;
  cursor: pointer;
  min-width: 220px;
}

.session-select:focus { border-color: var(--amber); }

/* ── Terminal Viewer ── */
.terminal {
  background: var(--bg-input);
  border: 1px solid var(--border-weld);
  border-radius: var(--radius);
  padding: 0.9rem;
  min-height: 500px;
  max-height: 70vh;
  overflow-y: auto;
  font-size: 0.78rem;
  line-height: 1.7;
  color: var(--text-secondary);
  scroll-behavior: smooth;
  white-space: pre-wrap;
  word-break: break-word;
}

.terminal::-webkit-scrollbar { width: 5px; }
.terminal::-webkit-scrollbar-track { background: transparent; }
.terminal::-webkit-scrollbar-thumb { background: var(--border-weld); border-radius: 3px; }

.terminal .line { display: block; }
.terminal .line-log { color: var(--text-secondary); }
.terminal .line-stage { color: var(--amber); font-weight: 700; }
.terminal .line-error { color: var(--red-alert); }
.terminal .line-success { color: var(--green-ok); }
.terminal .line-info { color: var(--blue-data); }

.terminal-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: var(--text-dim);
  font-style: italic;
  font-size: 0.85rem;
}

/* ── Spinner ── */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border-weld);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 0.3rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Flow Graph ── */
.panel-flow { margin-top: 0.5rem; }

.flow-lanes {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.flow-lane {
  display: flex;
  align-items: center;
  gap: 0;
}

.flow-lane-label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  width: 80px;
  flex-shrink: 0;
  text-align: right;
  padding-right: 0.8rem;
}

.flow-nodes {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  position: relative;
}

.flow-node {
  position: relative;
  background: var(--bg-input);
  border: 1px solid var(--border-weld);
  border-radius: var(--radius);
  padding: 0.45rem 0.7rem;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
  transition: all 0.35s ease;
  z-index: 1;
}

.flow-node.completed {
  border-color: var(--green-ok);
  color: var(--green-ok);
  background: var(--green-glow);
}

.flow-node.active {
  border-color: var(--amber);
  color: var(--amber);
  background: var(--amber-glow);
  box-shadow: 0 0 12px rgba(232, 168, 48, 0.25), inset 0 0 8px rgba(232, 168, 48, 0.08);
  animation: node-pulse 2s ease infinite;
}

.flow-node.failed {
  border-color: var(--red-alert);
  color: var(--red-alert);
  background: var(--red-glow);
}

.flow-node.idle {
  border-color: var(--border-weld);
  color: var(--text-dim);
  background: var(--bg-input);
}

@keyframes node-pulse {
  0%, 100% { box-shadow: 0 0 12px rgba(232, 168, 48, 0.25); }
  50% { box-shadow: 0 0 20px rgba(232, 168, 48, 0.45), inset 0 0 12px rgba(232, 168, 48, 0.12); }
}

.flow-connector {
  width: 28px;
  height: 2px;
  background: var(--border-weld);
  flex-shrink: 0;
  position: relative;
  transition: background 0.35s ease;
}

.flow-connector::after {
  content: '';
  position: absolute;
  right: -1px;
  top: -3px;
  width: 0;
  height: 0;
  border-left: 5px solid var(--border-weld);
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  transition: border-left-color 0.35s ease;
}

.flow-connector.lit { background: var(--amber-dim); }
.flow-connector.lit::after { border-left-color: var(--amber-dim); }
.flow-connector.done { background: var(--green-ok); }
.flow-connector.done::after { border-left-color: var(--green-ok); }

.flow-loop {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px dashed var(--border-weld);
  border-radius: var(--radius);
  padding: 0.3rem 0.4rem;
  position: relative;
  transition: border-color 0.35s ease;
}

.flow-loop.active-loop { border-color: var(--amber-dim); }

.flow-loop-label {
  position: absolute;
  top: -8px;
  left: 10px;
  font-size: 0.5rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  background: var(--bg-plate);
  padding: 0 0.3rem;
}

/* ── Stats Bar ── */
.stats-bar {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.stat-box {
  background: var(--bg-input);
  border: 1px solid var(--border-weld);
  border-radius: var(--radius);
  padding: 0.55rem 1rem;
  text-align: center;
  flex: 1;
}

.stat-value {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.4rem;
  color: var(--text-primary);
  line-height: 1;
}

.stat-label {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-top: 0.2rem;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber-dim), var(--amber));
  border-radius: 3px;
  width: 0%;
  transition: width 0.5s ease;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .flow-lane { flex-wrap: wrap; }
  .flow-lane-label { width: 100%; text-align: left; padding-bottom: 0.3rem; }
  .stats-bar { flex-wrap: wrap; }
  .stat-box { min-width: 80px; }
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">&#9875;</div>
    Shipyard
  </div>
  <div class="header-controls">
    <div class="live-badge" id="liveBadge">
      <div class="live-dot"></div>
      <span>LIVE</span>
    </div>
    <div class="health-badge checking" id="healthBadge">
      <div class="health-dot"></div>
      <span id="healthText">Checking...</span>
    </div>
  </div>
</header>

<!-- Main Content -->
<div class="bridge">

  <!-- Terminal Panel -->
  <div class="panel">
    <div class="panel-header">
      Pipeline Output
      <span class="tag tag-live" id="modeTag">LIVE</span>
      <div class="spacer"></div>
      <div class="session-picker">
        <select class="session-select" id="sessionSelect">
          <option value="">-- select session --</option>
        </select>
      </div>
    </div>
    <div class="panel-body" style="padding:0;">
      <div class="terminal" id="terminal">
        <div class="terminal-empty" id="terminalEmpty">No active pipeline. Select a past session to replay.</div>
      </div>
    </div>
  </div>

  <!-- Flow Graph + Stats -->
  <div class="panel panel-flow">
    <div class="panel-header">
      Rebuild Pipeline
      <span class="tag tag-live">FLOW</span>
      <div class="spacer"></div>
      <span id="storyLabel" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim);"></span>
    </div>
    <div class="panel-body">
      <div class="flow-lanes">
        <div class="flow-lane">
          <div class="flow-lane-label">Rebuild</div>
          <div class="flow-nodes">
            <div class="flow-node idle" id="fr-load">Load Backlog</div>
            <div class="flow-connector" id="fc-r1"></div>
            <div class="flow-node idle" id="fr-init">Init Project</div>
            <div class="flow-connector" id="fc-r2"></div>
            <div class="flow-loop" id="fr-loop">
              <div class="flow-loop-label">per story</div>
              <div class="flow-node idle" id="fr-tdd">TDD Pipeline</div>
              <div class="flow-connector" id="fc-r3"></div>
              <div class="flow-node idle" id="fr-test">Test</div>
              <div class="flow-connector" id="fc-r4"></div>
              <div class="flow-node idle" id="fr-review">Review</div>
              <div class="flow-connector" id="fc-r5"></div>
              <div class="flow-node idle" id="fr-tag">Git Tag</div>
            </div>
            <div class="flow-connector" id="fc-r6"></div>
            <div class="flow-node idle" id="fr-done">Complete</div>
          </div>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-box">
          <div class="stat-value" id="statCompleted">&mdash;</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statFailed">&mdash;</div>
          <div class="stat-label">Failed</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statInterventions">&mdash;</div>
          <div class="stat-label">Interventions</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="statTotal">&mdash;</div>
          <div class="stat-label">Total</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="rebuildProgress"></div></div>
    </div>
  </div>

</div>

<script>
const API = window.location.origin;

// ── State ──
let currentMode = 'idle';     // 'idle' | 'live' | 'replay'
let liveSessionId = null;
let liveEventSource = null;
let pollInterval = null;
let lastEventId = 0;

// ── DOM refs ──
const terminal = document.getElementById('terminal');
const terminalEmpty = document.getElementById('terminalEmpty');
const sessionSelect = document.getElementById('sessionSelect');
const liveBadge = document.getElementById('liveBadge');
const modeTag = document.getElementById('modeTag');
const storyLabel = document.getElementById('storyLabel');

// ── Helpers ──
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function classifyLine(text) {
  const lower = text.toLowerCase();
  if (lower.includes('error') || lower.includes('failed') || lower.includes('traceback')) return 'line-error';
  if (lower.includes('completed') || lower.includes('passed') || lower.includes('success')) return 'line-success';
  if (lower.includes('stage:') || lower.includes('>>>') || lower.includes('===')) return 'line-stage';
  return 'line-log';
}

function appendLine(text, eventType) {
  terminalEmpty.style.display = 'none';
  const span = document.createElement('span');
  span.className = 'line';
  if (eventType === 'stage') {
    span.className += ' line-stage';
  } else if (eventType === 'error') {
    span.className += ' line-error';
  } else {
    span.className += ' ' + classifyLine(text);
  }
  span.textContent = text + '\n';
  terminal.appendChild(span);
  terminal.scrollTop = terminal.scrollHeight;
}

function clearTerminal() {
  terminal.innerHTML = '';
  terminalEmpty.style.display = 'flex';
  terminal.appendChild(terminalEmpty);
}

function setMode(mode) {
  currentMode = mode;
  if (mode === 'live') {
    liveBadge.classList.add('active');
    modeTag.textContent = 'LIVE';
    modeTag.className = 'tag tag-live';
  } else if (mode === 'replay') {
    liveBadge.classList.remove('active');
    modeTag.textContent = 'REPLAY';
    modeTag.className = 'tag tag-replay';
  } else {
    liveBadge.classList.remove('active');
    modeTag.textContent = '';
    modeTag.className = 'tag';
  }
}

// ── Flow Graph ──
const REBUILD_NODES = ['fr-load','fr-init','fr-tdd','fr-test','fr-review','fr-tag','fr-done'];
const REBUILD_CONNS = ['fc-r1','fc-r2','fc-r3','fc-r4','fc-r5','fc-r6'];
const STAGE_INDEX = {
  loading_backlog:0, init_project:1, tdd_pipeline:2, testing:3, reviewing:4, git_tag:5, complete:6
};

function setFlowState(nodeId, state) {
  const el = document.getElementById(nodeId);
  if (el) el.className = 'flow-node ' + state;
}

function setConnector(connId, state) {
  const el = document.getElementById(connId);
  if (el) el.className = 'flow-connector' + (state ? ' ' + state : '');
}

function resetFlow() {
  REBUILD_NODES.forEach(id => setFlowState(id, 'idle'));
  REBUILD_CONNS.forEach(id => setConnector(id, ''));
  document.getElementById('fr-loop').classList.remove('active-loop');
}

function advanceFlow(activeIdx) {
  REBUILD_NODES.forEach((id, i) => {
    if (i < activeIdx) setFlowState(id, 'completed');
    else if (i === activeIdx) setFlowState(id, 'active');
    else setFlowState(id, 'idle');
  });
  REBUILD_CONNS.forEach((id, i) => {
    if (i < activeIdx) setConnector(id, 'done');
    else if (i === activeIdx) setConnector(id, 'lit');
    else setConnector(id, '');
  });
  if (activeIdx >= 2 && activeIdx <= 5) {
    document.getElementById('fr-loop').classList.add('active-loop');
  } else {
    document.getElementById('fr-loop').classList.remove('active-loop');
  }
}

function completeFlow() {
  REBUILD_NODES.forEach(id => setFlowState(id, 'completed'));
  REBUILD_CONNS.forEach(id => setConnector(id, 'done'));
  document.getElementById('fr-loop').classList.remove('active-loop');
}

function updateFlowFromEvent(text, eventType) {
  if (eventType !== 'stage') return;
  const stage = text.trim().toLowerCase().replace(/\s+/g, '_');
  const idx = STAGE_INDEX[stage];
  if (idx !== undefined) {
    if (stage === 'complete') completeFlow();
    else advanceFlow(idx);
  }
}

function updateStats(metadata) {
  if (!metadata) return;
  if (metadata.completed !== undefined) document.getElementById('statCompleted').textContent = metadata.completed;
  if (metadata.failed !== undefined) document.getElementById('statFailed').textContent = metadata.failed;
  if (metadata.interventions !== undefined) document.getElementById('statInterventions').textContent = metadata.interventions;
  if (metadata.total_stories !== undefined) document.getElementById('statTotal').textContent = metadata.total_stories;
  if (metadata.total_stories > 0 && metadata.story_index !== undefined) {
    const pct = (metadata.story_index / metadata.total_stories) * 100;
    document.getElementById('rebuildProgress').style.width = pct + '%';
  }
  if (metadata.story && metadata.epic) {
    storyLabel.innerHTML = escapeHtml(metadata.epic) + ' / ' + escapeHtml(metadata.story);
  }
}

function resetStats() {
  ['statCompleted','statFailed','statInterventions','statTotal'].forEach(id => {
    document.getElementById(id).innerHTML = '&mdash;';
  });
  document.getElementById('rebuildProgress').style.width = '0%';
  storyLabel.textContent = '';
}

// ── Live Mode (SSE) ──
function startLive(sessionId) {
  stopLive();
  liveSessionId = sessionId;
  clearTerminal();
  resetFlow();
  resetStats();
  setMode('live');
  appendLine('Connected to live session: ' + sessionId, 'stage');

  liveEventSource = new EventSource(API + '/api/stream/' + sessionId);

  liveEventSource.addEventListener('log', function(e) {
    appendLine(e.data, 'log');
  });

  liveEventSource.addEventListener('stage', function(e) {
    appendLine('>>> STAGE: ' + e.data, 'stage');
    updateFlowFromEvent(e.data, 'stage');
  });

  liveEventSource.addEventListener('error_event', function(e) {
    appendLine(e.data, 'error');
  });

  liveEventSource.addEventListener('done', function(e) {
    appendLine('\n--- Session ended ---', 'stage');
    completeFlow();
    liveEventSource.close();
    liveEventSource = null;
    setMode('idle');
    loadSessionList();
  });

  liveEventSource.onerror = function() {
    // SSE connection lost — fall back to polling
    if (liveEventSource) liveEventSource.close();
    liveEventSource = null;
    startPolling(sessionId);
  };
}

function stopLive() {
  if (liveEventSource) {
    liveEventSource.close();
    liveEventSource = null;
  }
  stopPolling();
  liveSessionId = null;
}

// ── Polling fallback ──
function startPolling(sessionId) {
  stopPolling();
  lastEventId = 0;
  setMode('live');

  pollInterval = setInterval(async () => {
    try {
      const r = await fetch(API + '/api/logs/' + sessionId + '?after_id=' + lastEventId);
      const d = await r.json();
      for (const ev of d.events) {
        if (ev.event_type === 'stage') {
          appendLine('>>> STAGE: ' + ev.text, 'stage');
          updateFlowFromEvent(ev.text, 'stage');
        } else {
          appendLine(ev.text, ev.event_type);
        }
        if (ev.metadata) updateStats(ev.metadata);
      }
      if (d.latest_id > lastEventId) lastEventId = d.latest_id;

      // Check if session is still active
      const active = await fetch(API + '/api/active');
      const ad = await active.json();
      if (!ad.active || ad.active.session_id !== sessionId) {
        appendLine('\n--- Session ended ---', 'stage');
        completeFlow();
        stopPolling();
        setMode('idle');
        loadSessionList();
      }
    } catch (e) {
      // Network error, retry on next tick
    }
  }, 2000);
}

function stopPolling() {
  if (pollInterval) {
    clearInterval(pollInterval);
    pollInterval = null;
  }
}

// ── Replay Mode ──
async function loadReplay(sessionId) {
  stopLive();
  clearTerminal();
  resetFlow();
  resetStats();
  setMode('replay');
  appendLine('Loading session: ' + sessionId + '...', 'stage');

  try {
    const r = await fetch(API + '/api/logs/' + sessionId);
    const d = await r.json();

    clearTerminal();
    if (d.events.length === 0) {
      terminalEmpty.textContent = 'No log events found for this session.';
      terminalEmpty.style.display = 'flex';
      return;
    }

    for (const ev of d.events) {
      if (ev.event_type === 'stage') {
        appendLine('>>> STAGE: ' + ev.text, 'stage');
        updateFlowFromEvent(ev.text, 'stage');
      } else {
        appendLine(ev.text, ev.event_type);
      }
      if (ev.metadata) updateStats(ev.metadata);
    }
    completeFlow();
  } catch (e) {
    appendLine('Failed to load session: ' + e.message, 'error');
  }
}

// ── Session List ──
async function loadSessionList() {
  try {
    const r = await fetch(API + '/api/sessions');
    const sessions = await r.json();
    const current = sessionSelect.value;

    // Keep the first placeholder option
    sessionSelect.innerHTML = '<option value="">-- select session --</option>';

    for (const s of sessions) {
      const opt = document.createElement('option');
      opt.value = s.session_id;
      const date = s.started_at ? new Date(s.started_at).toLocaleString() : 'unknown';
      const status = s.status === 'running' ? ' [LIVE]' : '';
      opt.textContent = date + ' (' + s.pipeline_type + ')' + status + ' — ' + s.event_count + ' events';
      if (s.session_id === current) opt.selected = true;
      sessionSelect.appendChild(opt);
    }
  } catch (e) {
    // Silently fail — sessions list is non-critical
  }
}

sessionSelect.addEventListener('change', function() {
  const sessionId = this.value;
  if (!sessionId) {
    stopLive();
    clearTerminal();
    resetFlow();
    resetStats();
    setMode('idle');
    return;
  }
  // Check if this is the active session
  fetch(API + '/api/active').then(r => r.json()).then(d => {
    if (d.active && d.active.session_id === sessionId) {
      startLive(sessionId);
    } else {
      loadReplay(sessionId);
    }
  }).catch(() => {
    loadReplay(sessionId);
  });
});

// ── Auto-detect live session on load ──
async function checkForLiveSession() {
  try {
    const r = await fetch(API + '/api/active');
    const d = await r.json();
    if (d.active) {
      sessionSelect.value = d.active.session_id;
      startLive(d.active.session_id);
    }
  } catch (e) {
    // No active session or server not reachable
  }
}

// ── Health Check ──
async function checkHealth() {
  const badge = document.getElementById('healthBadge');
  const text = document.getElementById('healthText');
  try {
    const r = await fetch(API + '/health', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if (d.status === 'ok') {
      badge.className = 'health-badge ok';
      text.textContent = 'SYSTEM HEALTH';
    } else {
      badge.className = 'health-badge error';
      text.textContent = 'Degraded';
    }
  } catch {
    badge.className = 'health-badge error';
    text.textContent = 'Offline';
  }
}

// ── Init ──
checkHealth();
setInterval(checkHealth, 30000);
loadSessionList();
setInterval(loadSessionList, 15000);
checkForLiveSession();
</script>
